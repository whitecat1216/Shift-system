services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotel-shift-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hotel_admin}:${POSTGRES_PASSWORD:-hotel_password}@db:5432/${POSTGRES_DB:-hotel_shift}
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules

  db:
    image: postgres:16-alpine
    container_name: hotel-shift-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hotel_shift}
      POSTGRES_USER: ${POSTGRES_USER:-hotel_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hotel_password}
      TZ: Asia/Tokyo
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hotel_admin} -d ${POSTGRES_DB:-hotel_shift}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  app_node_modules:
  postgres_data:
